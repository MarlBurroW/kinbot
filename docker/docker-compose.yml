services:
  kinbot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - kinbot-data:/app/data
    environment:
      - PORT=3000
      - KINBOT_DATA_DIR=/app/data
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped

volumes:
  kinbot-data:
